<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجري الرقمي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: "Tahoma", sans-serif;
        }

        .navbar-brand {
            font-size: 22px;
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .btn-success {
            border-radius: 10px;
            font-size: 16px;
        }

        .badge-offer {
            background: red;
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>

<body class="bg-light">

<!-- HEADER -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container text-center">
        <span class="navbar-brand mx-auto">
            📄 متجر المنتجات (PDF)
        </span>
    </div>
</nav>

<!-- INTRO -->
<div class="container mt-4 text-center">
    <h5 class="mb-2">📚 مرحبا بك في متجري الرقمي</h5>
    <p class="text-muted">
        📥 جميع الملفات تُرسل مباشرة بعد الدفع عبر واتساب
    </p>
    <p class="text-success fw-bold">
        🔥 عروض حصرية بأسعار منخفضة
    </p>

    <!-- المنتجات -->
    <div class="row mt-4" id="products"></div>
</div>

<!-- FOOTER -->
<div class="text-center mt-5 mb-3 text-muted">
    <small>© 2026 جميع الحقوق محفوظة</small>
</div>

<script src="script.js"></script>
</body>
</html>
